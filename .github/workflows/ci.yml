# GreenMetrics CI Pipeline
#
# Doctrine refs:
#   - Rule 23 (tooling discipline)
#   - Rule 24 (testability)
#   - Rule 45 (backend quality threshold)
#   - Rule 52 (shift-left)
#   - Rule 53 (software supply chain)
#   - Rule 54 (policy as code)
#   - Rule 56 (automation over process)
#
# Supply-chain note (Rule 53):
#   GitHub Actions are referenced by version tag here for readability. Dependabot
#   (`.github/dependabot.yml`) is configured to migrate every `uses:` to a commit
#   SHA on its next weekly run, with `# vX.Y.Z` trailing comment for human review.
#   Until that migration lands, the supply chain risk is documented as RISK-005
#   in `docs/RISK-REGISTER.md` with a 14-day mitigation window.
#
#   Branch protection enforces: required status checks (every job below), required
#   PR reviews (CODEOWNERS), no force push to main, conversation resolution,
#   commits signed (verified by GitHub Actions).

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # for codeql + policy-gate to comment
  security-events: write # for codeql to upload SARIF

jobs:

  # --------------------------------------------------------------------------
  # Pre-commit (shift-left mirror — fast fail at top of pipeline).
  # Rule 52.
  # --------------------------------------------------------------------------
  pre-commit-ci:
    name: Pre-commit · mirror
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      # Pre-commit's `language: golang` hooks (golangci-lint v1.61.0,
      # dnephin/pre-commit-golang v0.5.1) do `go install ./...` on the hook
      # executable. Their transitive deps (e.g. golang.org/x/tools v0.24.0)
      # contain code that fails to compile under Go 1.26's stricter constant
      # checks. Pin Go to 1.24 here only — the project itself is built
      # against 1.26 in `backend-build` / `backend-unit` / `backend-lint`.
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure

  # --------------------------------------------------------------------------
  # Backend (Go + Fiber).
  # --------------------------------------------------------------------------
  backend-lint:
    name: Backend · golangci-lint + vet
    needs: [pre-commit-ci]
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: backend/go.sum
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        # Action v7+ supports golangci-lint v2.x. v6 only supports v1 (which
        # is built with Go 1.24 and refuses to lint Go 1.26 code).
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: backend

  backend-test:
    name: Backend · unit + race + coverage
    needs: [pre-commit-ci]
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: greenmetrics
          POSTGRES_PASSWORD: greenmetrics
          POSTGRES_DB: greenmetrics_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U greenmetrics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://greenmetrics:greenmetrics@localhost:5432/greenmetrics_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: backend/go.sum
      - run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage gate (Rule 24, Rule 44)
        run: |
          # Soft gate during S1 — flips to blocking in S5 when domain split lands.
          coverage=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Total coverage: ${coverage}%"
          # TODO renan: enforce >= 80 once internal/domain/ ships in S2.
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  backend-build:
    name: Backend · build (CGO_ENABLED=0)
    needs: [backend-lint, backend-test]
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
          cache-dependency-path: backend/go.sum
      - run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o bin/greenmetrics-backend ./cmd/server

  # --------------------------------------------------------------------------
  # Frontend (SvelteKit 2).
  # --------------------------------------------------------------------------
  frontend-lint:
    name: Frontend · lint + svelte-check
    needs: [pre-commit-ci]
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: npm ci || npm install
      - run: npm run lint
      - run: npm run check

  frontend-test:
    name: Frontend · vitest
    needs: [pre-commit-ci]
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: npm ci || npm install
      - run: npm test

  frontend-build:
    name: Frontend · build
    needs: [frontend-lint, frontend-test]
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: frontend/package-lock.json }
      - run: npm ci || npm install
      - run: npm run build

  # --------------------------------------------------------------------------
  # Docker (multi-stage, GHA cache).
  # --------------------------------------------------------------------------
  docker:
    name: Docker · build images
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: greenmetrics-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: greenmetrics-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  # Security gates (SAST, deps, secrets, IaC, license).
  # Rules 19, 23, 39, 53, 54.
  # --------------------------------------------------------------------------
  security:
    name: Security · gitleaks + semgrep + govulncheck + trivy + osv
    needs: [pre-commit-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # Gitleaks needs full git history to scan the diff between base and
        # head; the default shallow clone makes it fail with "stderr is not
        # empty / failed to scan Git repository".
        with: { fetch-depth: 0 }
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with: { config: p/default p/owasp-top-ten p/golang }
      - name: Set up Go (for govulncheck)
        uses: actions/setup-go@v5
        with: { go-version: '1.26' }
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          # `go install` puts the binary in $GOPATH/bin which isn't on PATH
          # by default in actions/setup-go. Add it explicitly. Declared and
          # assigned on separate lines to satisfy shellcheck SC2155 (so the
          # subshell exit status from `go env` is not masked by `export`).
          GOBIN="$(go env GOPATH)/bin"
          export PATH="$GOBIN:$PATH"
          cd backend && govulncheck ./...
      - name: Trivy FS
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
      - name: osv-scanner (cross-source vuln check)
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          # `--skip-git` was a v1 flag (removed in v2; git-history scanning is
          # opt-in now via `scan git`). Remaining args: recursive directory
          # scan from the repo root.
          scan-args: |-
            --recursive
            ./

  license:
    name: License · go-licenses + npm-licenses
    needs: [pre-commit-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26', cache: true, cache-dependency-path: backend/go.sum }
      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest
      - name: go-licenses check (deny GPL-3.0+ in commercial path)
        working-directory: backend
        run: |
          go-licenses check ./... \
            --disallowed_types=forbidden,restricted \
            --ignore=github.com/greenmetrics/backend
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: npm license-checker
        working-directory: frontend
        run: |
          npx -y license-checker@latest --production --excludePackages 'greenmetrics-frontend' \
            --failOn 'GPL-3.0;GPL-3.0+;AGPL-3.0;AGPL-3.0+'

  # --------------------------------------------------------------------------
  # Static config + manifests (Rule 54 policy-as-code).
  # --------------------------------------------------------------------------
  policy-gate-k8s:
    name: Policy · kubeconform + conftest k8s
    needs: [pre-commit-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/
      - name: kubeconform
        run: kubeconform -strict -summary -schema-location default k8s/
      - name: Install conftest
        env:
          CONFTEST_VERSION: 0.68.2
        run: |
          # Conftest release assets are named conftest_<version>_Linux_x86_64.tar.gz
          # (case-sensitive `Linux`; no `latest` alias filename) — pin per Rule 53.
          curl -sL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" | tar xz
          sudo mv conftest /usr/local/bin/
      - name: conftest k8s (audit mode in S1; enforce in S3)
        run: |
          if [ -d policies/conftest/k8s ]; then
            conftest test --policy policies/conftest/k8s/ k8s/ || echo "[conftest k8s] audit-mode violations — non-blocking until S3."
          else
            echo "policies/conftest/k8s/ not yet shipped (lands in S2). Skipping."
          fi

  policy-gate-dockerfile:
    name: Policy · hadolint + conftest dockerfile
    needs: [pre-commit-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: hadolint backend
        uses: hadolint/hadolint-action@v3.1.0
        with: { dockerfile: backend/Dockerfile, format: json, output-file: hadolint-backend.json, no-fail: true }
      - name: hadolint frontend
        uses: hadolint/hadolint-action@v3.1.0
        with: { dockerfile: frontend/Dockerfile, format: json, output-file: hadolint-frontend.json, no-fail: true }
      - name: Print hadolint summary
        run: |
          jq -r '.[] | "\(.file):\(.line) [\(.code)] \(.message)"' hadolint-backend.json hadolint-frontend.json || true

  policy-gate-terraform:
    name: Policy · tfsec + checkov + tflint + conftest terraform
    needs: [pre-commit-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: '1.8.0' }
      - name: terraform fmt + validate
        working-directory: terraform
        run: |
          terraform fmt -check -recursive
          # `terraform validate` requires init; skip in CI without backend creds for now.
      - name: tfsec
        # Audit-mode in S1–S5 (Plan §5.3); enforce in S3 hardening per
        # `policies/conftest/terraform/` once those policies ship. tfsec
        # findings are surfaced in the run summary; the gate is the conftest
        # step below + Kyverno admission at deploy time.
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/
          soft_fail: true
      - name: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          quiet: true
          soft_fail: true   # audit mode in S1; flip to blocking in S3.

  actions-lint:
    name: Policy · actionlint
    needs: [pre-commit-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: raven-actions/actionlint@v2

  # --------------------------------------------------------------------------
  # Contract validation (Rule 14, Rule 34).
  # --------------------------------------------------------------------------
  openapi-lint:
    name: Contract · OpenAPI lint
    needs: [pre-commit-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: redocly lint
        run: |
          if [ -f api/openapi/v1.yaml ]; then
            npx -y @redocly/cli@latest lint api/openapi/v1.yaml
          else
            echo "api/openapi/v1.yaml not yet extracted from internal/handlers/openapi.go (lands S2). Skipping."
          fi

  config-schema:
    name: Contract · config schema validate
    needs: [pre-commit-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: ajv validate
        run: |
          if [ -f docs/contracts/config.schema.json ]; then
            npx -y ajv-cli@latest validate -s docs/contracts/config.schema.json -d .env.example || true
          else
            echo "docs/contracts/config.schema.json not yet shipped (lands S2). Skipping."
          fi

  # --------------------------------------------------------------------------
  # ADR + checklist enforcement (Rule 11, Rule 27).
  # --------------------------------------------------------------------------
  adr-link-check:
    name: ADR · markdownlint + tradeoff-stanza presence
    needs: [pre-commit-ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: markdownlint ADRs
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: 'docs/adr/*.md'
      - name: Verify Tradeoff Stanza presence
        run: |
          fail=0
          for f in docs/adr/[0-9]*.md; do
            if [ "$(basename "$f")" = "0000-template.md" ]; then continue; fi
            for needle in '\*\*Solves:\*\*' '\*\*Optimises for:\*\*' '\*\*Sacrifices:\*\*' '\*\*Residual risks:\*\*'; do
              if ! grep -q "$needle" "$f"; then
                echo "ADR $f missing tradeoff stanza element: $needle"
                fail=1
              fi
            done
          done
          [ $fail -eq 0 ] || exit 1

  # --------------------------------------------------------------------------
  # SBOM + coverage upload.
  # --------------------------------------------------------------------------
  quality:
    name: Quality · SBOM + coverage upload
    needs: [backend-test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: backend-coverage, path: backend }
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          artifact-name: greenmetrics-sbom.spdx.json
