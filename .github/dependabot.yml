# Dependabot configuration for GreenMetrics.
# See docs/SUPPLY-CHAIN.md for the full supply-chain trust model.
# Doctrine refs: Rules 53 (supply chain), 55 (continuous threat modeling), 56 (automation over process).

version: 2
updates:

  # Go modules — backend.
  - package-ecosystem: "gomod"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 10
    reviewers:
      - "greenmetrics/platform-team"
      - "greenmetrics/secops"
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      go-security:
        applies-to: security-updates
        patterns:
          - "*"
      go-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # NPM — frontend.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 10
    reviewers:
      - "greenmetrics/app-team"
      - "greenmetrics/secops"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions — pin to commit SHAs (Rule 53 supply chain).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 10
    reviewers:
      - "greenmetrics/secops"
      - "greenmetrics/platform-team"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"

  # Docker base images — backend.
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "greenmetrics/secops"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"

  # Docker base images — frontend.
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "greenmetrics/secops"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"

  # Terraform providers + modules.
  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    reviewers:
      - "greenmetrics/platform-team"
      - "greenmetrics/secops"
    labels:
      - "dependencies"
      - "terraform"
    commit-message:
      prefix: "chore(terraform)"
