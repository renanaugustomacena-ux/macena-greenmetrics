# Dependabot configuration for GreenMetrics.
# See docs/SUPPLY-CHAIN.md for the full supply-chain trust model.
# Doctrine refs: Rules 53 (supply chain), 55 (continuous threat modeling), 56 (automation over process).
#
# 2026-05-01 update: every ecosystem now ships a SINGLE grouped PR per cycle —
# security updates fast-tracked into their own group, all non-security
# updates (patch + minor + major) batched together. Cadence dropped from
# weekly to monthly to keep the PR queue quiet between active sprints.
# Major-version bumps now arrive together for batched human review instead
# of fanning out into 9+ individual PRs.

version: 2
updates:

  # Go modules — backend.
  - package-ecosystem: "gomod"
    directory: "/backend"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    reviewers:
      - "greenmetrics/platform-team"
      - "greenmetrics/secops"
    labels:
      - "dependencies"
      - "go"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      go-security:
        applies-to: security-updates
        patterns:
          - "*"
      go-all:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
          - "major"

  # NPM — frontend.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    reviewers:
      - "greenmetrics/app-team"
      - "greenmetrics/secops"
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
      npm-all:
        applies-to: version-updates
        update-types:
          - "patch"
          - "minor"
          - "major"

  # GitHub Actions — pin to commit SHAs (Rule 53 supply chain).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Rome"
    open-pull-requests-limit: 5
    reviewers:
      - "greenmetrics/secops"
      - "greenmetrics/platform-team"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"
    groups:
      actions-all:
        patterns:
          - "*"

  # Docker base images — backend.
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 3
    reviewers:
      - "greenmetrics/secops"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
    groups:
      docker-backend-all:
        patterns:
          - "*"

  # Docker base images — frontend.
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 3
    reviewers:
      - "greenmetrics/secops"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
    groups:
      docker-frontend-all:
        patterns:
          - "*"

  # Terraform providers + modules.
  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "monthly"
      day: "monday"
    open-pull-requests-limit: 3
    reviewers:
      - "greenmetrics/platform-team"
      - "greenmetrics/secops"
    labels:
      - "dependencies"
      - "terraform"
    commit-message:
      prefix: "chore(terraform)"
    groups:
      terraform-all:
        patterns:
          - "*"
