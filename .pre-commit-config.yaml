# Pre-commit hooks for GreenMetrics.
# Install: `pip install pre-commit && pre-commit install`
# Run all: `pre-commit run --all-files`
# Doctrine refs: Rule 23 (tooling discipline), Rule 52 (shift-left), Rule 54 (policy as code).

# All hook revs are pinned to commit SHA per Rule 53 (supply chain).
# Renovate / Dependabot bumps these weekly.

minimum_pre_commit_version: "3.5.0"
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:

  # Generic file hygiene.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: cef0300fd0fc4d2a87a85fa2093c6b283ea36f4b  # v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # Secret scanning.
  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e  # v8.30.1
    hooks:
      - id: gitleaks

  # Shell scripts.
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: 2491238703a5d3415bb2b7ff11388bf775372f29  # v0.10.0
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]

  # Markdown.
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: aa975a18c9a869648007d33864034dbc7481fe5e  # v0.42.0
    hooks:
      - id: markdownlint
        args: ["--fix", "--config", ".markdownlint.json"]

  # YAML lint.
  - repo: https://github.com/adrienverge/yamllint
    rev: 81e9f98ffd059efe8aa9c1b1a42e5cce61b640c6  # v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint.yaml"]

  # Go.
  - repo: https://github.com/golangci/golangci-lint
    rev: a1d6c560de1a193a0c68ffed68cd5928ef39e884  # v1.61.0
    hooks:
      - id: golangci-lint
        args: ["--fast"]
        files: ^backend/.*\.go$

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: fb24a639f7c938759fe56eeebbb7713b69d60494  # v0.5.1
    hooks:
      - id: go-fmt
        files: ^backend/.*\.go$
      - id: go-imports
        files: ^backend/.*\.go$
      - id: go-vet
        files: ^backend/.*\.go$

  # JavaScript/TypeScript.
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: ffb6a759a979008c0e6dff86e39f4745a2d9eac4  # v3.1.0
    hooks:
      - id: prettier
        files: ^frontend/.*\.(ts|tsx|js|jsx|svelte|css|md|json|yaml|yml)$

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: b57b7398617489b9042a6561733d7eed33b331e2  # v9.13.0
    hooks:
      - id: eslint
        files: ^frontend/.*\.(ts|tsx|js|jsx|svelte)$
        args: ["--cache"]

  # Dockerfile.
  - repo: https://github.com/hadolint/hadolint
    rev: 33deb7817c88475caa1ce7d832922ff0f674fa15  # v2.13.1
    hooks:
      - id: hadolint-docker

  # Terraform.
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: 89f45610a846f56273a6c4290b3c42534175949e  # v1.96.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
        args:
          - "--args=--config=__GIT_WORKING_DIR__/terraform/.tflint.hcl"
      - id: terraform_tfsec

  # GitHub Actions lint.
  - repo: https://github.com/rhysd/actionlint
    rev: 03d0035246f3e81f36aed592ffb4bebf33a03106  # v1.7.4
    hooks:
      - id: actionlint

  # Kubernetes — kubeconform runs in CI's policy-gate-k8s job (the enforcement
  # gate). yannh/kubeconform does not ship a .pre-commit-hooks.yaml, so we use
  # a local hook that calls the binary if it's installed and skips otherwise.
  # Per Rule 54 (policy as code) the CI gate is authoritative.
  - repo: local
    hooks:
      - id: kubeconform-k8s
        name: kubeconform validate k8s/ (audit)
        language: system
        entry: bash -c 'command -v kubeconform >/dev/null && kubeconform -strict -summary -schema-location default k8s/ || echo "[kubeconform] binary not installed locally; CI policy-gate-k8s will gate."'
        pass_filenames: false
        files: ^k8s/.*\.ya?ml$
      - id: conftest-k8s
        name: conftest test k8s/ (audit)
        language: system
        entry: bash -c 'conftest test --policy policies/conftest/k8s/ k8s/ --no-fail || echo "[conftest k8s] violations — non-blocking locally; CI will gate."'
        pass_filenames: false
        files: ^(k8s/.*|policies/conftest/k8s/.*)$
      - id: conftest-dockerfile
        name: conftest test Dockerfile (audit)
        language: system
        entry: bash -c 'true # placeholder until policies/conftest/dockerfile/ ships in S2'
        pass_filenames: false

  # Conventional commit messages.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 406f0d1a4ffcd9eb0be9f0f6b824df619b38f41e  # v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, refactor, docs, test, chore, perf, ci, build, revert, style]
