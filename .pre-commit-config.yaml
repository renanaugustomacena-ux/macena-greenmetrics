# Pre-commit hooks for GreenMetrics.
# Install: `pip install pre-commit && pre-commit install`
# Run all: `pre-commit run --all-files`
# Doctrine refs: Rule 23 (tooling discipline), Rule 52 (shift-left), Rule 54 (policy as code).

# All hook revs are pinned to commit SHA per Rule 53 (supply chain).
# Renovate / Dependabot bumps these weekly.

minimum_pre_commit_version: "3.5.0"
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:

  # Generic file hygiene.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: cef0300fd0fc4d2a87a85fa2093c6b283ea36f4b  # v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
        # Exclude files that use templated syntax incompatible with the
        # strict YAML parser: GitHub Actions ${{ }} expressions (validated
        # separately by `actionlint`), Grafana alerting files that mix flow
        # mappings with PromQL expressions, and the go-task Taskfile (uses
        # {{ .Var }} templating).
        exclude: '^(\.github/workflows/|grafana/alerting/|Taskfile\.ya?ml$)'
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # Secret scanning.
  - repo: https://github.com/gitleaks/gitleaks
    rev: 83d9cd684c87d95d656c1458ef04895a7f1cbd8e  # v8.30.1
    hooks:
      - id: gitleaks

  # Shell scripts.
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: 2491238703a5d3415bb2b7ff11388bf775372f29  # v0.10.0
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]

  # Markdown.
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: aa975a18c9a869648007d33864034dbc7481fe5e  # v0.42.0
    hooks:
      - id: markdownlint
        args: ["--fix", "--config", ".markdownlint.json"]

  # YAML lint.
  - repo: https://github.com/adrienverge/yamllint
    rev: 81e9f98ffd059efe8aa9c1b1a42e5cce61b640c6  # v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint.yaml"]

  # GitHub Actions lint.
  - repo: https://github.com/rhysd/actionlint
    rev: 03d0035246f3e81f36aed592ffb4bebf33a03106  # v1.7.4
    hooks:
      - id: actionlint
        # Skip workflows that use templated content the actionlint shyaml-lib
        # parser cannot handle — validated separately in CI's actionlint job.
        exclude: '^\.github/workflows/dast\.yml$'

  # Language-specific tools (Go, Frontend, Docker, Terraform) run in their
  # dedicated CI jobs (Rule 54 policy as code). Pre-commit-CI duplicates that
  # work by reinstalling each toolchain on every PR — fragile (different go.sum
  # paths between repo root and backend/, ESLint v9 flat-config migration not
  # done, hadolint requires Docker-in-runner, Terraform binary not pre-installed
  # in the runner image). Authoritative gates:
  #
  #   golangci-lint + go vet -> CI `Backend · golangci-lint + vet` job
  #   gofmt + goimports      -> CI `Backend · golangci-lint + vet` job
  #   prettier + eslint      -> CI `Frontend · lint + svelte-check` job
  #   hadolint               -> CI `Policy · hadolint + conftest dockerfile`
  #   terraform fmt/validate -> CI `Policy · tfsec + checkov + tflint + conftest terraform`
  #   tflint + tfsec         -> CI `Policy · tfsec + checkov + tflint + conftest terraform`

  # Kubernetes — kubeconform runs in CI's policy-gate-k8s job (the enforcement
  # gate). yannh/kubeconform does not ship a .pre-commit-hooks.yaml, so we use
  # a local hook that calls the binary if it's installed and skips otherwise.
  # Per Rule 54 (policy as code) the CI gate is authoritative.
  - repo: local
    hooks:
      - id: kubeconform-k8s
        name: kubeconform validate k8s/ (audit)
        language: system
        entry: bash -c 'command -v kubeconform >/dev/null && kubeconform -strict -summary -schema-location default k8s/ || echo "[kubeconform] binary not installed locally; CI policy-gate-k8s will gate."'
        pass_filenames: false
        files: ^k8s/.*\.ya?ml$
      - id: conftest-k8s
        name: conftest test k8s/ (audit)
        language: system
        entry: bash -c 'conftest test --policy policies/conftest/k8s/ k8s/ --no-fail || echo "[conftest k8s] violations — non-blocking locally; CI will gate."'
        pass_filenames: false
        files: ^(k8s/.*|policies/conftest/k8s/.*)$
      - id: conftest-dockerfile
        # Placeholder until policies/conftest/dockerfile/ ships in Sprint S2.
        name: conftest test Dockerfile (audit)
        language: system
        entry: "true"
        pass_filenames: false

  # Conventional commit messages.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 406f0d1a4ffcd9eb0be9f0f6b824df619b38f41e  # v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, refactor, docs, test, chore, perf, ci, build, revert, style]
