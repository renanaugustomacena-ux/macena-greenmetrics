# Pre-commit hooks for GreenMetrics.
# Install: `pip install pre-commit && pre-commit install`
# Run all: `pre-commit run --all-files`
# Doctrine refs: Rule 23 (tooling discipline), Rule 52 (shift-left), Rule 54 (policy as code).

# All hook revs are pinned to commit SHA per Rule 53 (supply chain).
# Renovate / Dependabot bumps these weekly.

minimum_pre_commit_version: "3.5.0"
default_install_hook_types:
  - pre-commit
  - commit-msg

repos:

  # Generic file hygiene.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: cef0300fd0fc4d2a87a85fa2093c6b283ea36f4b  # v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  # Secret scanning.
  - repo: https://github.com/gitleaks/gitleaks
    rev: 77c3c0e2ff3ee0e62ab3b80b4c9b1e90e78cf9b0  # v8.21.2
    hooks:
      - id: gitleaks

  # Shell scripts.
  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: 2491238703a5d3415bb2b7ff11388bf775372f29  # v0.10.0
    hooks:
      - id: shellcheck
        args: ["--severity=warning"]

  # Markdown.
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: 586c3ea3f51230da42bbe8c6d1c5d0fdce5cf4ec  # v0.42.0
    hooks:
      - id: markdownlint
        args: ["--fix", "--config", ".markdownlint.json"]

  # YAML lint.
  - repo: https://github.com/adrienverge/yamllint
    rev: 81e9f98ffd059efe8aa9c1b1a42e5cce61b640c6  # v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint.yaml"]

  # Go.
  - repo: https://github.com/golangci/golangci-lint
    rev: 7d5fbb0f7da40cefa1b89a2d9f2d8cd9d3a98f70  # v1.61.0
    hooks:
      - id: golangci-lint
        args: ["--fast"]
        files: ^backend/.*\.go$

  - repo: https://github.com/dnephin/pre-commit-golang
    rev: f4d2e63b40f1e0bf9a0fa1f08a3e63775eb2c26c  # v0.5.1
    hooks:
      - id: go-fmt
        files: ^backend/.*\.go$
      - id: go-imports
        files: ^backend/.*\.go$
      - id: go-vet
        files: ^backend/.*\.go$

  # JavaScript/TypeScript.
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: ffb6a759a979008c0e6dff86e39f4745a2d9eac4  # v3.1.0
    hooks:
      - id: prettier
        files: ^frontend/.*\.(ts|tsx|js|jsx|svelte|css|md|json|yaml|yml)$

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: e4e4e9ff19fe923869b4f86b0e09ada8a4b3e3a5  # v9.13.0
    hooks:
      - id: eslint
        files: ^frontend/.*\.(ts|tsx|js|jsx|svelte)$
        args: ["--cache"]

  # Dockerfile.
  - repo: https://github.com/hadolint/hadolint
    rev: 4d8d8bd425a76c1818e4dad2c6c7ad0cb44ec7c4  # v2.13.1
    hooks:
      - id: hadolint-docker

  # Terraform.
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: 4e8e0ec7c7ff0f10f01ad1fde67a5bdcc22e1a1c  # v1.96.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
      - id: terraform_tflint
        args:
          - "--args=--config=__GIT_WORKING_DIR__/terraform/.tflint.hcl"
      - id: terraform_tfsec

  # GitHub Actions lint.
  - repo: https://github.com/rhysd/actionlint
    rev: 03d0035246f3e81f36aed592ffb4bebf33a03106  # v1.7.4
    hooks:
      - id: actionlint

  # Kubernetes.
  - repo: https://github.com/yannh/kubeconform
    rev: dc11ed83d7e29f4b5cb064e1f2b0c40c08e10a7d  # v0.6.7
    hooks:
      - id: kubeconform
        args:
          - "-strict"
          - "-summary"
          - "-schema-location"
          - "default"
        files: ^k8s/.*\.ya?ml$

  # OPA / conftest — runs in audit mode locally; CI is the enforcement gate.
  - repo: local
    hooks:
      - id: conftest-k8s
        name: conftest test k8s/ (audit)
        language: system
        entry: bash -c 'conftest test --policy policies/conftest/k8s/ k8s/ --no-fail || echo "[conftest k8s] violations — non-blocking locally; CI will gate."'
        pass_filenames: false
        files: ^(k8s/.*|policies/conftest/k8s/.*)$
      - id: conftest-dockerfile
        name: conftest test Dockerfile (audit)
        language: system
        entry: bash -c 'true # placeholder until policies/conftest/dockerfile/ ships in S2'
        pass_filenames: false

  # Conventional commit messages.
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: c19c40ec6df7dd8ad8e2d1c7e8e4f0e5b4f3b3c1  # v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, refactor, docs, test, chore, perf, ci, build, revert, style]
