apiVersion: 1

providers:
  - name: greenmetrics-dashboards
    orgId: 1
    folder: GreenMetrics
    folderUid: greenmetrics
    type: file
    disableDeletion: true
    editable: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
