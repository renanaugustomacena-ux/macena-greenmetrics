apiVersion: 1
groups:
  - orgId: 1
    name: greenmetrics-disk
    folder: GreenMetrics
    interval: 1m
    rules:
      - uid: gm-disk-saturation-warn
        title: Disk usage > 80%
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 600, to: 0 }
            model: { expr: 1 - node_filesystem_avail_bytes / node_filesystem_size_bytes, refId: A, instant: true }
          - refId: B
            datasourceUid: __expr__
            model: { type: threshold, expression: A, conditions: [{ evaluator: { type: gt, params: [0.8] } }], refId: B }
        for: 15m
        annotations: { runbook_url: https://github.com/greenmetrics/greenmetrics/blob/main/docs/runbooks/capacity-spike.md }
        labels: { severity: warning }
      - uid: gm-disk-saturation-crit
        title: Disk usage > 90% (page)
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 600, to: 0 }
            model: { expr: 1 - node_filesystem_avail_bytes / node_filesystem_size_bytes, refId: A, instant: true }
          - refId: B
            datasourceUid: __expr__
            model: { type: threshold, expression: A, conditions: [{ evaluator: { type: gt, params: [0.9] } }], refId: B }
        for: 5m
        annotations: { runbook_url: https://github.com/greenmetrics/greenmetrics/blob/main/docs/runbooks/capacity-spike.md }
        labels: { severity: critical }
