apiVersion: 1
groups:
  - orgId: 1
    name: greenmetrics-ingest-queue
    folder: GreenMetrics
    interval: 30s
    rules:
      - uid: gm-ingest-queue-depth
        title: Ingest queue depth > 8000 (saturation)
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model: { expr: gm_ingest_queue_depth, refId: A, instant: true }
          - refId: B
            datasourceUid: __expr__
            model: { type: threshold, expression: A, conditions: [{ evaluator: { type: gt, params: [8000] } }], refId: B }
        for: 2m
        annotations:
          runbook_url: https://github.com/greenmetrics/greenmetrics/blob/main/docs/runbooks/pulse-webhook-flood.md
        labels: { severity: warning }
