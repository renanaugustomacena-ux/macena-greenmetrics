apiVersion: 1
groups:
  - orgId: 1
    name: greenmetrics-jwt-failures
    folder: GreenMetrics
    interval: 1m
    rules:
      - uid: gm-jwt-failure-spike
        title: JWT failure spike (possible brute-force)
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model: { expr: rate(gm_login_failed_total[5m]), refId: A, instant: true }
          - refId: B
            datasourceUid: __expr__
            model: { type: threshold, expression: A, conditions: [{ evaluator: { type: gt, params: [0.5] } }], refId: B }
        for: 5m
        annotations:
          runbook_url: https://github.com/greenmetrics/greenmetrics/blob/main/docs/runbooks/tenant-data-leak.md
        labels: { severity: warning }
