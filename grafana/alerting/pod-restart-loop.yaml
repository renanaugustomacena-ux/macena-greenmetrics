apiVersion: 1
groups:
  - orgId: 1
    name: greenmetrics-pod-restarts
    folder: GreenMetrics
    interval: 1m
    rules:
      - uid: gm-pod-restart-loop
        title: Pod restart count > 5 in 1h
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 3600, to: 0 }
            model: { expr: increase(kube_pod_container_status_restarts_total{namespace=~"greenmetrics.*"}[1h]), refId: A, instant: true }
          - refId: B
            datasourceUid: __expr__
            model: { type: threshold, expression: A, conditions: [{ evaluator: { type: gt, params: [5] } }], refId: B }
        for: 5m
        annotations: { runbook_url: https://github.com/greenmetrics/greenmetrics/blob/main/docs/runbooks/ingestor-crash-loop.md }
        labels: { severity: warning }
