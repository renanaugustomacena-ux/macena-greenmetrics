apiVersion: 1
groups:
  - orgId: 1
    name: greenmetrics-cert-expiry
    folder: GreenMetrics
    interval: 5m
    rules:
      - uid: gm-cert-expiry-14d
        title: TLS certificate expires in < 14 days
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 600, to: 0 }
            model: { expr: cert_exporter_not_after - time(), refId: A, instant: true }
          - refId: B
            datasourceUid: __expr__
            model: { type: threshold, expression: A, conditions: [{ evaluator: { type: lt, params: [1209600] } }], refId: B }
        for: 1h
        annotations:
          runbook_url: https://github.com/greenmetrics/greenmetrics/blob/main/docs/runbooks/cert-rotation.md
        labels: { severity: warning }
