apiVersion: 1
groups:
  - orgId: 1
    name: greenmetrics-egress
    folder: GreenMetrics
    interval: 1m
    rules:
      - uid: gm-network-policy-deny
        title: NetworkPolicy denied egress (potential exfil attempt)
        condition: B
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange: { from: 300, to: 0 }
            model: { expr: rate(cilium_drop_count_total{reason="Policy denied"}[5m]), refId: A, instant: true }
          - refId: B
            datasourceUid: __expr__
            model: { type: threshold, expression: A, conditions: [{ evaluator: { type: gt, params: [0] } }], refId: B }
        for: 5m
        annotations: { runbook_url: https://github.com/greenmetrics/greenmetrics/blob/main/docs/runbooks/tenant-data-leak.md }
        labels: { severity: critical }
