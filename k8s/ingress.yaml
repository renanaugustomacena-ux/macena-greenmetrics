---
# Ingress routes external traffic to the frontend and backend.
# TLS terminates here (cert-manager provisions Let's Encrypt via ACME HTTP-01).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: greenmetrics
  namespace: greenmetrics
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    # Security headers are added by the backend but double-belt at edge.
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
spec:
  ingressClassName: nginx
  tls:
    - hosts: [app.greenmetrics.it]
      secretName: greenmetrics-tls
  rules:
    - host: app.greenmetrics.it
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: greenmetrics-backend
                port:
                  name: http
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: greenmetrics-backend
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: greenmetrics-frontend
                port:
                  name: http
