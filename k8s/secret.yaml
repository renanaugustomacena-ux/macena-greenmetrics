---
# Secret template — values MUST be populated via External Secrets Operator
# (AWS Secrets Manager / HashiCorp Vault). The values below are sentinels that
# the backend refuses to boot with (see internal/config/config.go Load()).
#
# Apply with:
#   kubectl apply -f secret.yaml      # creates placeholders
# then rotate via your secrets pipeline.
apiVersion: v1
kind: Secret
metadata:
  name: greenmetrics-backend-secrets
  namespace: greenmetrics
type: Opaque
stringData:
  # Refused by config.Load — rotate via ExternalSecret.
  JWT_SECRET: "REPLACE_VIA_EXTERNAL_SECRETS"
  DATABASE_URL: "postgres://REPLACE_VIA_EXTERNAL_SECRETS"
  GRAFANA_URL: "http://greenmetrics-grafana:3000"
  GRAFANA_ADMIN_USER: "admin"
  GRAFANA_ADMIN_PASSWORD: "REPLACE_VIA_EXTERNAL_SECRETS"
  PULSE_WEBHOOK_SECRET: "REPLACE_VIA_EXTERNAL_SECRETS"
  OCPP_CENTRAL_SYSTEM_URL: ""
  SUNSPEC_MODBUS_ADDR: ""
---
