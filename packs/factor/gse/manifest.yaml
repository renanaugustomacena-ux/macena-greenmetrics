notes: |
  GSE Factor Pack — Italian renewable-energy mix shares plus the AIB
  residual-mix entrypoint published via GSE's "Energia statistica /
  Anagrafica" channel. The renewable share feeds Piano 5.0 attestazione
  calculations; the AIB residual mix is the Scope 2 market-based
  reference for ESRS E1 dossiers. Refresh cadence: annual (Q3, after
  AIB residual-mix publication; six-month lag from production year).
