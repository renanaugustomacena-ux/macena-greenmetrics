# External Secrets Operator — ClusterSecretStore backed by AWS Secrets Manager.
# Doctrine refs: Rule 19, Rule 39, Rule 57 (least privilege via IRSA), Rule 62 (secrets discipline).
# Plan ADR: docs/adr/0003-secret-management-eso-vs-vault.md.

apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  annotations:
    secops.greenmetrics.it/risk: "RISK-024"
spec:
  provider:
    aws:
      service: SecretsManager
      region: eu-south-1
      auth:
        # IRSA — pod ServiceAccount `external-secrets/external-secrets` assumes
        # the IAM role `greenmetrics-external-secrets-irsa` (terraform/modules/iam-irsa).
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
