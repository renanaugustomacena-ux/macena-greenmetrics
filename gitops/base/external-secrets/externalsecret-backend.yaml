# ExternalSecret — backend secret materialisation from AWS Secrets Manager.
# Doctrine refs: Rule 19, Rule 39, Rule 62.
# Mitigates: RISK-003 (JWT static), RISK-013 (sentinel reach prod), RISK-024 (ESO sync failure visible).

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: greenmetrics-backend
  namespace: greenmetrics
  annotations:
    secops.greenmetrics.it/risk: "RISK-003, RISK-013, RISK-024"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: greenmetrics-backend-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      metadata:
        annotations:
          rotation.greenmetrics.it/rotated-at: "{{ now | date \"2006-01-02T15:04:05Z\" }}"
  data:
    - secretKey: JWT_SECRET
      remoteRef:
        key: greenmetrics/prod/jwt
        property: secret
    - secretKey: JWT_KID_CURRENT
      remoteRef:
        key: greenmetrics/prod/jwt
        property: kid
    - secretKey: DATABASE_URL
      remoteRef:
        key: greenmetrics/prod/db
        property: url
    - secretKey: PULSE_WEBHOOK_SECRET
      remoteRef:
        key: greenmetrics/prod/pulse
        property: secret
    - secretKey: REDIS_URL
      remoteRef:
        key: greenmetrics/prod/redis
        property: url
    - secretKey: SUNSPEC_MODBUS_ADDR
      remoteRef:
        key: greenmetrics/prod/sunspec
        property: addr
    - secretKey: OCPP_CENTRAL_SYSTEM_URL
      remoteRef:
        key: greenmetrics/prod/ocpp
        property: url
