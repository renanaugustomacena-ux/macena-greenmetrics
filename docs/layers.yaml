crossings:

  - from: app
    to: platform
    contract: K8s envFrom (ConfigMap + Secret)
    source_of_truth: k8s/configmap.yaml, k8s/secret.yaml
  - from: app
    to: platform
    contract: OTLP gRPC trace export
    source_of_truth: OTEL_EXPORTER_OTLP_ENDPOINT
  - from: app
    to: platform
    contract: Prometheus /metrics exposition
    source_of_truth: backend/internal/metrics/metrics.go
  - from: app
    to: platform
    contract: zap JSON stdout for Promtail/Loki
    source_of_truth: backend/cmd/server/main.go zap config
  - from: platform
    to: infra
    contract: ESO ClusterSecretStore → AWS Secrets Manager
    source_of_truth: gitops/base/external-secrets/clustersecretstore.yaml
  - from: platform
    to: infra
    contract: ServiceAccount IRSA annotation → IAM role
    source_of_truth: k8s/service.yaml, terraform/modules/iam-irsa
  - from: platform
    to: infra
    contract: pgx connection string → RDS
    source_of_truth: DATABASE_URL via ESO
  - from: tooling
    to: app
    contract: oapi-codegen-generated request/response types
    source_of_truth: api/openapi/v1.yaml
  - from: tooling
    to: platform
    contract: Argo CD Application manifest
    source_of_truth: gitops/argocd/applications/
  - from: tooling
    to: tooling
    contract: conftest Rego rules
    source_of_truth: policies/conftest/
  - from: tooling
    to: platform
    contract: Kyverno ClusterPolicy admission
    source_of_truth: policies/kyverno/
  - from: operators
    to: all
    contract: runbook YAML front-matter
    source_of_truth: docs/runbooks/*.md
  - from: operators
    to: all
    contract: ADR four-part Tradeoff stanza
    source_of_truth: docs/adr/*.md
