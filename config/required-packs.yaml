# required-packs.yaml — declarative list of Packs required for this deployment.
#
# Doctrine refs: Rule 75 (capabilities declared, not discovered), Rule 73 (boot
# writes a manifest lock), Rule 70 (Pack manifests itself).
# Charter ref: §3.2 (Pack flavours), §4 (Pack contract).
#
# At boot the Pack-loader compares this file against the manifests it discovers
# under packs/<kind>/<id>/. A capability listed here that is not satisfied by
# at least one loaded Pack is a boot refusal. A Pack discovered but not listed
# here is a warning (the system runs, but the audit log records the surplus).
#
# This file is engagement-overridable per Rule 82: an engagement fork places
# its overrides in engagements/<client>/config/required-packs.yaml; the loader
# composes Core defaults < Pack defaults < engagement overrides.
#
# Sprint S6 begins populating Italian Region + Italian Factor + Italian
# Report Packs. The first three (Region IT + ISPRA + monthly_consumption)
# land in this PR; the remaining Italian Report Packs (ESRS E1, Piano 5.0,
# Conto Termico, TEE, audit 102/2014, CO₂ footprint) and the GSE / Terna /
# AIB Factor Packs follow in subsequent S6 PRs. Italian Protocol Packs land
# in S7. Identity Packs in S8.

required_capabilities:
  # ── Italian Region Pack ──────────────────────────────────────────────
  - region-profile-it
  - holiday-calendar-it
  - regulatory-thresholds-it

  # ── Italian Factor Packs ─────────────────────────────────────────────
  - factor-source-ispra
  - factor-source-gse
