# Loki Helm values for log aggregation.
# Doctrine: Rule 18, Rule 40, Rule 58.

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: 2026-01-01
        store: tsdb
        object_store: s3
        schema: v13
        index: { prefix: loki_index_, period: 24h }
  storage:
    type: s3
    s3:
      region: eu-south-1
      bucketNames: { chunks: greenmetrics-loki-chunks, ruler: greenmetrics-loki-ruler, admin: greenmetrics-loki-admin }
  limits_config:
    retention_period: 30d
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    max_query_length: 30d
  ruler:
    enable_alertmanager_v2: true
    alertmanager_url: http://kps-alertmanager.monitoring:9093
  audit_log_retention: 365d  # Audit log namespace special-cased

write:
  replicas: 2
  persistence:
    storageClass: gp3
    size: 20Gi

read:
  replicas: 2

backend:
  replicas: 2
  persistence:
    storageClass: gp3
    size: 10Gi

monitoring:
  serviceMonitor: { enabled: true }
  rules: { enabled: true }

promtail:
  enabled: true
  config:
    serverPort: 3101
    clients:
      - url: http://kps-loki-gateway.monitoring/loki/api/v1/push
    snippets:
      pipelineStages:
        - cri: {}
        - json:
            expressions:
              level: level
              request_id: request_id
              trace_id: trace_id
              span_id: span_id
              tenant_id: tenant_id
              service: service
        - labels:
            level:
            request_id:
            trace_id:
            tenant_id:
            service:
