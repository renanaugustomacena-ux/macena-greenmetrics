# kube-prometheus-stack Helm values for GreenMetrics.
# Doctrine refs: Rule 18, Rule 40, Rule 58.
# Helm: `helm install kps prometheus-community/kube-prometheus-stack --version 65.x -f values.yaml`

fullnameOverride: kps
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubeControllerManager: false
    kubelet: true
    kubeProxy: false
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: false
    kubeSchedulerRecording: false
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true

prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: "40GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: [ReadWriteOnce]
          resources: { requests: { storage: 50Gi } }
    resources:
      requests: { cpu: 200m, memory: 1Gi }
      limits:   { cpu: 1500m, memory: 4Gi }
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    additionalScrapeConfigs:
      - job_name: greenmetrics-backend
        kubernetes_sd_configs:
          - role: pod
            namespaces: { names: [greenmetrics, greenmetrics-staging] }
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            action: keep
            regex: greenmetrics-backend
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: (.+);(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          accessModes: [ReadWriteOnce]
          resources: { requests: { storage: 5Gi } }
  config:
    route:
      receiver: greenmetrics-default
      group_by: [alertname, namespace]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers: [severity = critical]
          receiver: pagerduty
          continue: true
        - matchers: [severity = warning]
          receiver: slack-ops
        - matchers: [severity = info]
          receiver: digest
    receivers:
      - name: greenmetrics-default
        slack_configs:
          - api_url: $SLACK_WEBHOOK_URL
            channel: '#greenmetrics-ops'
            send_resolved: true
            title: '{{ .CommonLabels.alertname }}'
            text: |
              *severity:* {{ .CommonLabels.severity }}
              *runbook:* {{ .CommonAnnotations.runbook_url }}
              *summary:* {{ .CommonAnnotations.summary }}
              *description:* {{ .CommonAnnotations.description }}
      - name: slack-ops
        slack_configs:
          - api_url: $SLACK_WEBHOOK_URL
            channel: '#greenmetrics-ops'
            send_resolved: true
      - name: pagerduty
        pagerduty_configs:
          - service_key: $PAGERDUTY_SERVICE_KEY
            severity: '{{ if eq .CommonLabels.severity "critical" }}critical{{ else }}warning{{ end }}'
      - name: digest
        slack_configs:
          - api_url: $SLACK_WEBHOOK_URL
            channel: '#greenmetrics-info'
            send_resolved: false
    inhibit_rules:
      - source_matchers: [alertname = DBPrimaryDown]
        target_matchers: [severity =~ "warning|info"]
        equal: [namespace]

grafana:
  enabled: false   # Grafana is provisioned separately at grafana/provisioning/ → S4 dashboards land here.

nodeExporter: { enabled: true }
kubeStateMetrics: { enabled: true }
prometheusOperator:
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits:   { cpu: 500m, memory: 256Mi }
